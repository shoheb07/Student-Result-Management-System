<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="form-container">

    <h1>Add Student Result</h1>

    <form method="POST">

        <input type="text"
               name="roll_no"
               placeholder="Roll Number"
               required>

        <input type="text"
               name="name"
               placeholder="Student Name"
               required>

        <input type="number"
               name="subject1"
               placeholder="Subject 1 Marks"
               required>

        <input type="number"
               name="subject2"
               placeholder="Subject 2 Marks"
               required>

        <input type="number"
               name="subject3"
               placeholder="Subject 3 Marks"
               required>

        <button type="submit">Save Result</button>

    </form>

    <a href="/">Back</a>

</div>

</body>
</html>
